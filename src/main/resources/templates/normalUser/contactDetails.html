<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{normalUser/base::Layout(~{::section})}">
<head>
	<meta charset="UTF-8" />
	<title>Contact Details Page</title>
</head>
<body>
<section>
	<div class="card contact-details-card shadow-lg border-0 mt-4">
    	<div class="card-body" th:if="${contact}">
    
    		<div th:replace="~{fragments/alert :: alertBox}"></div>

        	<!-- Profile Section -->
	        <div class="text-center">
           		<img th:if="${contact.imageurl != null && !contact.imageurl.isEmpty()}"
     			th:src="@{/uploads/{img}(img=${contact.imageurl})}"
     			class="contact-profile-img">

				<img th:if="${contact.imageurl == null || contact.imageurl.isEmpty()}"
     			th:src="@{/image/default-contact.png}"
     			class="contact-profile-img">

            	<h2 class="mt-3 mb-1 font-weight-bold"
                th:text="${contact.name}">
            	</h2>

            	<span class="badge badge-primary px-3 py-2"
                th:text="${contact.relation}">
            	</span>
        	</div>
        	
        	<hr>

        	<!-- Contact Details -->
        	<div class="table-responsive">
            	<table class="table table-borderless contact-table">
                <tr>
                    <th>
                        <i class="fa-solid fa-user-tag text-primary"></i>
                        Nick Name
                    </th>
                    <td th:text="${contact.secondName}"></td>
                </tr>

                <tr>
                    <th>
                        <i class="fa-solid fa-envelope text-danger"></i>
                        Email
                    </th>
                    <td th:text="${contact.email}"></td>
                </tr>

                <tr>
                    <th>
                        <i class="fa-solid fa-phone text-success"></i>
                        Phone
                    </th>
                    <td th:text="${contact.phone}"></td>
                </tr>

                <tr>
                    <th>
                        <i class="fa-solid fa-users text-info"></i>
                        Relation
                    </th>
                    <td th:text="${contact.relation}"></td>
                </tr>
            </table>
        </div>

        <!-- Description -->
        <div class="description-box mt-4">
            <h5>
                <i class="fa-solid fa-file-lines text-primary"></i>
                About Contact
            </h5>

            <div th:utext="${contact.description}">
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="text-center mt-4">
            <form th:action="@{'/user/update_contact/' + ${contact.c_id}}"
      		method="post" style="display:inline;">

    			<button type="submit"
class="btn btn-warning contact-action-btn">
        			<i class="fa-solid fa-pen-to-square"></i>
        			Edit
    			</button>
			</form>

            <a th:href="@{/user/show_contacts/0}"
class="btn btn-secondary contact-action-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Back
            </a>
        </div>
    </div>
    
    <h1 class="text-center p-3 bg-danger text-white" th:unless="${contact}">
    	You don't have permission to see this contact...</h1>
</div>

<script>
setTimeout(() => {

    fetch('/user/remove-message')
        .then(() => {
            const alertBox = document.querySelector('.custom-alert');
            if(alertBox){
                alertBox.style.display = 'none';
            }
        });

}, 3000);
</script>
</section>

</body>
</html>
