<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
th:replace="~{normalUser/base::Layout(~{::section})}">
<head>
	<meta charset="UTF-8" />
	<title>Update Contact Page</title>
</head>
<body>
<section>
	<div class="card contact-card shadow mt-4">
		<div class="card-body p-5">

			<div th:replace="~{fragments/alert :: alertBox}"></div>

			<h2 class="text-center mb-2">
    			<i class="fa-solid fa-user-pen text-primary"></i>
    			Edit Contact Details
			</h2>

			<p class="text-center text-muted mb-4">
    			Update personal information, 
    			profile picture and contact details
			</p>

<!-- Current Contact Image -->
<div class="text-center mb-4">	
<img th:src="${contact.imageurl != null && !#strings.isEmpty(contact.imageurl)}
                    ? @{'/uploads/' + ${contact.imageurl}}
                    : @{/image/default-contact.png}"
         class="contact-preview-img">

    <h5 class="mt-3 mb-0"
        th:text="${contact.name}">
    </h5>

    <small class="text-muted">
        Current Profile Picture
    </small>
</div>

<form th:action="@{/user/update_processing}" method="post"
th:object="${contact}" enctype="multipart/form-data">

	<input type="hidden" name="c_id" th:value="${contact.c_id}">
					
	<!-- Row 1 -->
	<div class="row">
		<div class="col-md-6 mb-4">
			<label>Name</label>
			<div class="input-group">
				<div class="input-group-prepend">
					<span class="input-group-text"> 
						<i class="fa fa-user"></i>
					</span>
				</div>
				<input type="text" class="form-control"  placeholder="Enter Name"
				name="name" th:value="${contact.name}" required>
			</div>
		</div>

		<div class="col-md-6 mb-4">
			<label>Nick Name</label>
			<div class="input-group">
				<div class="input-group-prepend">
					<span class="input-group-text">
						<i class="fa fa-user-tag"></i>
					</span>
				</div>
				<input type="text" class="form-control" name="secondName"
				placeholder="Enter Nick Name" th:value="${contact.secondName}" 
				required>
			</div>
		</div>
	</div>

	<!-- Row 2 -->
	<div class="row">
		<div class="col-md-6 mb-4">
		<label>Email Address</label>
			<div class="input-group">
				<div class="input-group-prepend">
					<span class="input-group-text"> 
						<i class="fa fa-envelope"></i>
					</span>
				</div>
				<input type="email" class="form-control"
				placeholder="Enter Email"
				name="email" th:value="${contact.email}" required>
			</div>
		</div>

		<div class="col-md-6 mb-4">
			<label>Phone Number</label>
			<div class="input-group">
				<div class="input-group-prepend">
					<span class="input-group-text"> 
						<i class="fa fa-phone"></i>
					</span>
				</div>
				<input type="tel" class="form-control"
				placeholder="Enter Phone Number" th:value="${contact.phone}"
				name="phone" required min="10" max="13">
			</div>
		</div>
	</div>

	<!-- Row 3 -->
	<div class="row">
		<div class="col-md-6 mb-4">
			<label>Relation</label>
			<div class="input-group">
				<div class="input-group-prepend">
					<span class="input-group-text"> 
						<i class="fa fa-users"></i>
					</span>
				</div>
				<select class="form-control" name="relation" required>
    				<option value="">Select Relation</option>
    				<option value="Friend"
        			th:selected="${contact.relation == 'Friend'}">
        				Friend
    				</option>

    				<option value="Family"
        			th:selected="${contact.relation == 'Family'}">
        				Family
    				</option>

    				<option value="Colleague"
        			th:selected="${contact.relation == 'Colleague'}">
        				Colleague
    				</option>

    				<option value="Client"
        			th:selected="${contact.relation == 'Client'}">
        				Client
    				</option>

    				<option value="Teacher"
        			th:selected="${contact.relation == 'Teacher'}">
        				Teacher
    				</option>

    				<option value="Relative"
        			th:selected="${contact.relation == 'Relative'}">
        				Relative
    				</option>

    				<option value="Other"
        			th:selected="${contact.relation == 'Other'}">
        				Other
    				</option>
				</select>
				
			</div>
		</div>

		<div class="col-md-6 mb-4">
    		<label>
        		Change Profile Image
    		</label>

    		<div class="input-group">
        		<div class="input-group-prepend">
            		<span class="input-group-text">
                			<i class="fa fa-image"></i>
            		</span>
        		</div>
        		<input type="file" class="form-control"
                name="profileImage" accept="image/png,image/jpeg">
    		</div>

    		<small class="text-muted">
        		Leave empty if you want to keep the current image.
    		</small>
		</div>
	</div> 

	<!-- Description -->
	<div class="form-group">
		<label>Description</label>
		<textarea class="form-control" id="mytextarea" rows="6"
		placeholder="Write something about this contact..."
		name="description" th:text="${contact.description}"></textarea>
	</div>

	<!-- Buttons -->
	<div class="text-center mt-4 action-buttons">
    	<button type="submit"
         class="btn btn-success px-5 mr-3">
        	<i class="fa-solid fa-floppy-disk"></i>
        	Update Contact
    	</button>

    	<a th:href="@{/user/show_contacts/0}"
       	class="btn btn-secondary px-5">
			<i class="fa-solid fa-arrow-left"></i>
        	Back
    	</a>
	</div>
</form>
</div>
</div>
	
<script>
document.addEventListener('DOMContentLoaded', function () {

    const editorElement = document.querySelector('#mytextarea');

    if (editorElement) {
        ClassicEditor
            .create(editorElement)
            .catch(error => {
                console.error(error);
            });
    }

});
</script>

</section>
</body>
</html>
