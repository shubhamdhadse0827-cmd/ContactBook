<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::Layout(~{::section})}">
<head>
<meta charset="UTF-8" />
<title>Forgot Password</title>
</head>
<body>

<section class="settings-section">

    <div class="settings-card">
		<div th:replace="~{fragments/alert :: alertBox}"></div>

        <div class="settings-header">
            <i class="fas fa-lock"></i>
            <h2>Change Password</h2>
            <p>Update your account password to keep your account secure.</p>
        </div>

        <form th:action="@{/change-Password}" method="post">
     
			<div class="form-group">
    			<label>New Password</label>

    			<div class="password-wrapper">
        			<input type="password"
               		class="form-control password-field"
               		placeholder="Enter new password"
               		name="newPassword"
               		required>

        			<span class="toggle_password">
            			<i class="fa-solid fa-eye"></i>
        			</span>
    			</div>
			</div>

            <div class="form-group">
    			<label>Confirm Password</label>

    			<div class="password-wrapper">
        			<input type="password"
               		class="form-control password-field"
               		placeholder="Confirm new password"
               		name="confirmPassword"
               		required>

        			<span class="toggle_password">
            			<i class="fa-solid fa-eye"></i>
        			</span>
    			</div>
			</div>

            <div class="button_group">

                <button type="submit" class="save_btn">
                    Change Password
                </button>

                <button type="reset" class="reset_btn">
                    Reset
                </button>

            </div>

        </form>

    </div>

<script th:if="${session.msg != null && session.msg.type == 'success'}">

    setTimeout(function () {

        window.location.href = "/user/index";

    }, 2500);

</script>

</section>
</body>
</html>
