<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::Layout(~{::section})}">
<head>
<meta charset="UTF-8" />
<title>Register Page</title>
</head>
<body>

<!-- Registration Section -->
<section class="register-section">
	<div class="container">
		<div class="row justify-content-center">

			<!-- Registration Card -->
			<div class="col-md-7">
				<div class="register-card">

                    <!-- Success / Error Message -->
					<div th:replace="~{fragments/alert :: alertBox}"></div>
					
					<div id="otpAlertContainer"></div>
						
					<h1 class="text-center register-title">
						Create Your Account
					</h1>

					<p class="text-center register-subtitle">
						Join ContactBook and manage your contacts smarter
					</p>

                    <!-- Registration Form -->					
					<form th:action="@{/register_done}" method="post"
					th:object="${user}">
							
					<div class="form-group">
						<label for="name">Full Name</label>
						<input type="text"
						class="form-control custom-input" id="name"
						placeholder="Enter your full name" th:field="*{name}"
						th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">

						<div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
						class="invalid-feedback">
						</div>
					</div>

					<!-- <div class="form-group">
						<label for="email">Email Address</label>
						<input type="email"
						class="form-control custom-input" id="email"
						placeholder="Enter your email" th:field="*{email}"
						th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
						
						
						<div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
						class="invalid-feedback">
						</div>
					</div> -->
					
					<div class="form-group">
    <label for="email">Email Address</label>

    <div class="input-group">

        <input type="email"
               class="form-control custom-input"
               id="email"
               placeholder="Enter your email"
               th:field="*{email}"
               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">

        <div class="input-group-append">
            <button type="button" class="btn otp-btn"  onclick="sendOtp()">
                Send OTP
            </button>
        </div>

    </div>

    <div th:if="${#fields.hasErrors('email')}"
         th:errors="*{email}"
         class="invalid-feedback d-block">
    </div>
</div>

<div class="form-group mt-3" id="otpSection"
     th:style="${session.otpSent} ? 'display:block' : 'display:none'">
    <label for="otp">Verification Code</label>

    <input type="text"
           id="otp"
           name="otp"
           class="form-control custom-input"
           placeholder="Enter OTP sent to your email">

    <small class="text-muted">
        Enter the verification code sent to your email.
    </small>
</div>

					<!-- <div class="form-group">
					<label for="password">Password</label> <input type="password"
					class="form-control custom-input" id="password"
					placeholder="Create password" th:field="*{password}"
					th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">

					<div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
					class="invalid-feedback">
					</div>
					</div> -->
					
					<!-- Password Field with Show/Hide Option -->
					<div class="form-group">
    				<label for="password">Password</label>

    				<div class="input-group">
        			<input type="password"
               		class="form-control custom-input"
               		id="password" placeholder="Create password"
               		th:field="*{password}"
               		th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">

        			<div class="input-group-append">
            			<span class="input-group-text toggle-password"
                  		id="togglePassword">

                			<i class="fa-solid fa-eye"></i>
            			</span>
        			</div>
    			</div>

    			<div th:if="${#fields.hasErrors('password')}"
         		th:errors="*{password}" class="invalid-feedback d-block">
    			</div>
			</div>

			<div class="form-group">
				<label>About Yourself</label>
				<textarea rows="4" class="form-control custom-input"
				placeholder="Tell something about yourself" 
				th:field="*{about}"></textarea>
			</div>

			<div class="form-check mt-3">
				<input type="checkbox" name="agree" class="form-check-input"
				id="terms"> 
				
				<label class="form-check-label" for="terms">
					I agree to the 
					<span class="terms-text">
					 	Terms & Conditions 
					</span>
				</label>
			</div>

			<div class="text-center mt-4">
				<button type="submit" class="btn register-btn">
					Create Account
				</button>

				<button type="reset" class="btn reset-btn">
					Reset
				</button>
			</div>
		</form>
	</div>
</div>
</div>
</div>

<!-- Redirect To Login After Successful Registration -->
<script th:if="${session.msg != null && session.msg.type == 'alert-success'}">

    setTimeout(function () {

        window.location.href = "/login";

    }, 2500);

</script>

<!-- Remove Session Message After Display -->
<script th:if="${session.msg != null}">

    setTimeout(function () {

        fetch('/remove-message');

    }, 100);

</script>
</section>
</body>
</html>
